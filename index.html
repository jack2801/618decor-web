<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>618Decor | Kiến Trúc & Nội Thất</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.min.css">

    <style>
        /* Thêm font chữ cho sang trọng đúng chất kiến trúc */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        /* Hiệu ứng mượt mà khi chuyển tab */
        .fade-in {
            animation: fadeIn 0.5s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    
    <div id="app"></div>

    <script src="modules/header.js"></script>
    <script src="modules/home.js"></script>
    <script src="modules/footer.js"></script>
    <script src="modules/training.js"></script>
    <script src="modules/smart_tool.js"></script>

    <script>
        // Hàm chuyển tab đơn giản để bạn bè test cho mượt
        function switchTab(tabName) {
            console.log("Chuyển sang tab: " + tabName);
            window.scrollTo({ top: 0, behavior: 'smooth' });
            // Logic hiển thị module tương ứng của ông ở đây
        }
    </script>
</body>
</html>
